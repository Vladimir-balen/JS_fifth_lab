<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личные Финансы</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#8372;</span>
        <span class="logo-text">Личные финансы</span>
      </div>
      <div class="header-balance">
        <span class="balance-label">Общий баланс:</span>
        <span class="balance-value" id="total-balance">0.00 &#8372;</span>
      </div>
    </div>
  </header>

  <main class="main-content">

    <!-- Шаг 8: Форма добавления транзакции -->
    <section class="form-section">
      <h2 class="section-title">Добавить транзакцию</h2>
      <form id="transaction-form" novalidate>
        <div class="form-grid">

          <div class="form-group">
            <label for="amount">Сумма (&#8372;)</label>
            <input type="number" id="amount" placeholder="-500 или 1200" step="0.01" />
            <span class="error-msg" id="amount-error"></span>
          </div>

          <!-- Шаг 8: для категории используем select -->
          <div class="form-group">
            <label for="category">Категория</label>
            <select id="category">
              <option value="">— Выберите категорию —</option>
              <option value="Зарплата">Зарплата</option>
              <option value="Еда">Еда</option>
              <option value="Транспорт">Транспорт</option>
              <option value="Развлечения">Развлечения</option>
              <option value="Здоровье">Здоровье</option>
              <option value="Одежда">Одежда</option>
              <option value="Коммунальные">Коммунальные</option>
              <option value="Прочее">Прочее</option>
            </select>
            <span class="error-msg" id="category-error"></span>
          </div>

          <div class="form-group full-width">
            <label for="description">Описание</label>
            <input type="text" id="description" placeholder="Подробное описание транзакции..." />
            <span class="error-msg" id="description-error"></span>
          </div>

        </div>
        <button type="submit" class="btn-add">Добавить</button>
      </form>
    </section>

    <!-- Шаг 3: Таблица транзакций -->
    <section class="table-section">
      <h2 class="section-title">История транзакций</h2>
      <div class="table-wrapper">
        <table id="transactions-table">
          <thead>
            <tr>
              <th>Дата и Время</th>
              <th>Категория</th>
              <th>Краткое описание</th>
              <th>Действие</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="empty-row">
              <td colspan="4">Транзакций пока нет. Добавьте первую!</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Шаг 7: Блок полного описания транзакции -->
    <section class="detail-section" id="detail-section" style="display:none;">
      <h2 class="section-title">Детали транзакции</h2>
      <div class="detail-card" id="detail-card">
        <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value" id="detail-id"></span></div>
        <div class="detail-row"><span class="detail-label">Дата:</span><span class="detail-value" id="detail-date"></span></div>
        <div class="detail-row"><span class="detail-label">Категория:</span><span class="detail-value" id="detail-category"></span></div>
        <div class="detail-row"><span class="detail-label">Сумма:</span><span class="detail-value" id="detail-amount"></span></div>
        <div class="detail-row full"><span class="detail-label">Описание:</span><span class="detail-value" id="detail-description"></span></div>
      </div>
    </section>

  </main>

  <script src="src/utils.js"></script>
  <script src="src/transactions.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/index.js"></script>
</body>
</html>
